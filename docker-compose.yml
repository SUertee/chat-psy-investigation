version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-psy-backend
    env_file:
      - server/.env
    restart: unless-stopped
    expose:
      - "8001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-psy-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
