services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-psy-backend
    env_file:
      - server/.env
    ports:
      - "9001:8001"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-psy-frontend
    depends_on:
      - backend
    ports:
      - "9000:80"
    restart: unless-stopped
